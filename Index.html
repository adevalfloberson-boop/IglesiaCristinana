<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px}
body{background:#f8fafc;color:#0f172a;transition:background .3s,color .3s}
body.dark{background:#020617;color:#f1f5f9}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
body.dark ::-webkit-scrollbar-thumb{background:#334155}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:240px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;transition:width .3s;z-index:30;overflow:hidden}
body.dark .sidebar{background:#0f172a;border-color:#1e293b}
.sidebar.collapsed{width:68px}
.sidebar-logo{height:60px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid #e2e8f0;overflow:hidden;white-space:nowrap}
body.dark .sidebar-logo{border-color:#1e293b}
.logo-icon{width:34px;height:34px;background:#4f46e5;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.logo-text{font-weight:700;font-size:14px;overflow:hidden;transition:opacity .3s,width .3s;width:160px}
.sidebar.collapsed .logo-text{opacity:0;width:0}
.logo-text span{color:#4f46e5}
.sidebar-toggle{margin-left:auto;background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;border-radius:6px;flex-shrink:0;font-size:13px}
.sidebar-toggle:hover{background:#f1f5f9}
body.dark .sidebar-toggle:hover{background:#1e293b}
nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;cursor:pointer;border:none;background:none;color:#64748b;font-size:13px;font-weight:500;text-align:left;width:100%;transition:all .15s;white-space:nowrap;overflow:hidden}
body.dark .nav-item{color:#94a3b8}
.nav-item:hover{background:#f8fafc;color:#1e293b}
body.dark .nav-item:hover{background:#1e293b;color:#f1f5f9}
.nav-item.active{background:#eef2ff;color:#4f46e5}
body.dark .nav-item.active{background:#1e1b4b;color:#818cf8}
.nav-icon{font-size:17px;flex-shrink:0;width:20px;text-align:center}
.nav-label{transition:opacity .3s,width .3s;overflow:hidden}
.sidebar.collapsed .nav-label{opacity:0;width:0}
.sidebar-footer{padding:10px 8px;border-top:1px solid #e2e8f0;display:flex;flex-direction:column;gap:6px}
body.dark .sidebar-footer{border-color:#1e293b}
.user-card{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f8fafc;border-radius:12px;overflow:hidden}
body.dark .user-card{background:#1e293b}
.user-avatar{width:32px;height:32px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.user-info{overflow:hidden;transition:opacity .3s,width .3s;white-space:nowrap}
.sidebar.collapsed .user-info{opacity:0;width:0}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:#94a3b8}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:20;flex-shrink:0}
body.dark .topbar{background:#0f172a;border-color:#1e293b}
.topbar-title{font-size:18px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:10px}
.icon-btn{background:none;border:none;cursor:pointer;padding:7px;border-radius:10px;color:#64748b;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px}
.icon-btn:hover{background:#f1f5f9}
body.dark .icon-btn:hover{background:#1e293b}
body.dark .icon-btn{color:#94a3b8}
.badge-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#eef2ff 0%,#f0fdf4 100%)}
body.dark .login-wrap{background:linear-gradient(135deg,#1e1b4b 0%,#0f172a 100%)}
.login-card{background:#fff;border-radius:20px;padding:36px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
body.dark .login-card{background:#0f172a;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .logo-circle{width:56px;height:56px;background:#4f46e5;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:26px;margin-bottom:12px}
.login-logo h1{font-size:18px;font-weight:700;line-height:1.3}
.login-logo p{font-size:12px;color:#94a3b8;margin-top:4px}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;color:#0f172a;transition:border .2s;outline:none}
body.dark .form-input{background:#1e293b;border-color:#334155;color:#f1f5f9}
.form-input:focus{border-color:#4f46e5}
textarea.form-input{resize:vertical}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:11px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:inherit}
.btn-primary:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-outline{background:none;border:1.5px solid #e2e8f0;color:#64748b}
.btn-outline:hover{background:#f8fafc;color:#1e293b}
body.dark .btn-outline{border-color:#334155;color:#94a3b8}
body.dark .btn-outline:hover{background:#1e293b;color:#f1f5f9}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:inherit}
.action-btn:hover{opacity:.9}
.action-btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.action-btn-danger{background:#ef4444}
.action-btn-amber{background:#f59e0b}

/* ── CARDS ── */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px}
body.dark .card{background:#0f172a;border-color:#1e293b}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:18px;position:relative;overflow:hidden}
body.dark .stat-card{background:#0f172a;border-color:#1e293b}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;margin-top:8px;color:#10b981;font-weight:600;display:flex;align-items:center;gap:4px}
.stat-sub.neutral{color:#94a3b8}
.stat-icon{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left;border-bottom:1px solid #e2e8f0}
body.dark th{background:#1e293b;border-color:#334155;color:#94a3b8}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
body.dark td{border-color:#1e293b;color:#cbd5e1}
tr:hover td{background:#fafafa}
body.dark tr:hover td{background:#1e293b}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.badge-green{background:#dcfce7;color:#166534}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-gray{background:#f1f5f9;color:#64748b}
body.dark .badge-green{background:#14532d;color:#86efac}
body.dark .badge-blue{background:#1e3a5f;color:#93c5fd}
body.dark .badge-amber{background:#451a03;color:#fcd34d}
body.dark .badge-red{background:#450a0a;color:#fca5a5}
body.dark .badge-purple{background:#2e1065;color:#c4b5fd}
body.dark .badge-gray{background:#1e293b;color:#94a3b8}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
body.dark .modal{background:#0f172a}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.close-btn{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px;line-height:1;padding:4px}
.close-btn:hover{color:#ef4444}

/* ── NOTIFICATIONS ── */
.notif-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.notif{padding:12px 16px;border-radius:12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:10px;max-width:320px;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.15)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-success{background:#10b981;color:#fff}
.notif-error{background:#ef4444;color:#fff}
.notif-info{background:#3b82f6;color:#fff}

/* ── LAYOUT HELPERS ── */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;color:#0f172a;outline:none;width:240px}
body.dark .search-input{background:#1e293b;border-color:#334155;color:#f1f5f9}
.search-input:focus{border-color:#4f46e5}
select.form-select{padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:12px;font-family:inherit;background:#fff;color:#374151;outline:none;cursor:pointer}
body.dark select.form-select{background:#1e293b;border-color:#334155;color:#f1f5f9}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:15px;font-weight:700}

/* ── FINANCE ── */
.fin-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.fin-box{padding:16px;border-radius:14px}
.fin-box.income{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
body.dark .fin-box.income{background:#14532d;color:#86efac;border-color:#166534}

body.dark .fin-box.expense{background:#450a0a;color:#fca5a5;border-color:#9f1239}

body.dark .fin-box.balance{background:#1e1b4b;color:#a5b4fc;border-color:#3730a3}
.fin-box-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;margin-bottom:4px}
.fin-box-value{font-size:22px;font-weight:700}

/* ── CONFIG ── */
.config-section{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:14px}
body.dark .config-section{background:#0f172a;border-color:#1e293b}
.config-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9}
body.dark .config-row{border-color:#1e293b}
.config-row:last-child{border-bottom:none}
.toggle{width:40px;height:22px;background:#e2e8f0;border-radius:11px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.toggle.on{background:#4f46e5}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:21px}

.notif-dropdown{position:absolute;right:0;top:44px;width:300px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.1);z-index:50;padding:12px}
body.dark .notif-dropdown{background:#0f172a;border-color:#1e293b}
.notif-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px}
.notif-item:hover{background:#f8fafc}
body.dark .notif-item:hover{background:#1e293b}
.qr-sim{background:#0f172a;border-radius:14px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;border:1px solid #1e293b;text-align:center}
.qr-anim{font-size:56px;animation:bounce 1s infinite alternate}
@keyframes bounce{to{transform:translateY(-6px)}}
.visitor-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px}
body.dark .visitor-card{background:#0f172a;border-color:#1e293b}
.ann-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden}
body.dark .ann-card{background:#0f172a;border-color:#1e293b}
.ann-body{padding:16px}
.ann-footer{background:#f8fafc;border-top:1px solid #f1f5f9;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
body.dark .ann-footer{background:#1e293b;border-color:#334155}
.event-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px}
body.dark .event-card{background:#0f172a;border-color:#1e293b}

body.dark .ministry-card{background:#0f172a;border-color:#1e293b}
.report-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px}
body.dark .report-card{background:#0f172a;border-color:#1e293b}
.profile-header{display:flex;align-items:center;gap:14px;padding:16px;background:#f8fafc;border-radius:12px;margin-bottom:16px}
body.dark .profile-header{background:#1e293b}
.avatar-lg{width:52px;height:52px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
body.dark .detail-row{border-color:#1e293b}
.detail-row:last-child{border-bottom:none}
.detail-label{color:#94a3b8;font-weight:600}
.chart-container{position:relative;height:220px;width:100%}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.span-2{grid-column:1/-1}
</style>
</head>

const badge = s => `<span class="badge ${STATUS_CLASSES[s]||'badge-gray'}">${s}</span>`;

function showNotif(msg, type='info') {
  const c = document.getElementById('notifs');
  const d = document.createElement('div');
  d.className = `notif notif-${type}`;
  d.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span>${msg}`;
  c.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

// ── RENDER PRINCIPAL ──
function render() {
  document.body.className = state.darkMode ? 'dark' : '';
  if (!state.loggedIn) { renderLogin(); return; }
  document.getElementById('app').innerHTML = buildApp();
  bindAll();
  renderCharts();
}

function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-circle">✝</div>
        <h1>Iglesia Cristiana<br>Palabra Viva</h1>
        <p>Sistema de Gestión Integral</p>
      </div>
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input class="form-input" id="li-user" type="text" placeholder="Admin" value="${state.loginUser}" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="li-pass" type="password" placeholder="••••••••" value="${state.loginPass}" autocomplete="current-password">
      </div>
      ${state.loginError ? `<p style="color:#ef4444;font-size:12px;margin-bottom:12px;text-align:center">${state.loginError}</p>` : ''}
      <button class="btn-primary" id="li-btn">Iniciar Sesión</button>
      <p style="text-align:center;font-size:11px;color:#94a3b8;margin-top:16px">v1.0.0 · Iglesia Cristiana Palabra Viva</p>
    </div>
  </div>`;
  document.getElementById('li-btn').onclick = doLogin;
  document.getElementById('li-pass').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
}

function doLogin() {
  const u = document.getElementById('li-user').value.trim();
  const p = document.getElementById('li-pass').value;
  state.loginUser = u; state.loginPass = p;
  const user = (DB.get('users')||[]).find(x => x.username===u && x.password===p && x.active);
  if (user) {
    state.loggedIn = true; state.currentUser = user;
    state.loginError = ''; state.darkMode = DB.get('config')?.darkMode || false;
    render();
  } else {
    state.loginError = 'Usuario o contraseña incorrectos.';
    renderLogin();
  }
}

// ── ESTRUCTURA APP ──

  const members  = DB.get('members')  || [];

function buildTopbar() {
  const labels = {
    dashboard:'Dashboard', miembros:'Gestión de Miembros', visitantes:'Visitantes',

          <div class="notif-item"><div style="font-weight:600;margin-bottom:2px">Ofrenda procesada</div><div style="color:#10b981;font-weight:600;font-size:11px">+$1,250 — hoy</div></div>
          <div class="notif-item"><div style="font-weight:600;margin-bottom:2px">Evento próximo</div><div style="color:#94a3b8;font-size:11px">Celebración Familiar — 24 mayo</div></div>
        </div>` : ''}
      </div>

}

function buildContent(members, visitors, finance, events) {
  switch (state.tab) {
    case 'dashboard':     return tabDashboard(members, visitors, finance, events);
    case 'miembros':      return tabMembers(members);
    case 'visitantes':    return tabVisitors(visitors);
    case 'anuncios':      return tabAnnouncements();
    case 'eventos':       return tabEvents(events);
    case 'asistencia':    return tabAttendance();
    case 'finanzas':      return tabFinance(finance);
    case 'ministerios':   return tabMinistries();
    case 'reportes':      return tabReports(members, visitors, finance);
    case 'configuracion': return tabConfig();
    default: return '<p>Sección no encontrada</p>';
  }
}

function tabFinance(finance) {
  let filtered = finance.filter(f => {
    const s = state.searchFinance.toLowerCase();
    return (!s || f.donante.toLowerCase().includes(s) || f.categoria.toLowerCase().includes(s))
        && (state.filterFinanceTipo === 'Todos' || f.tipo === state.filterFinanceTipo);
  });
  const income  = finance.filter(f=>f.tipo==='Ingreso').reduce((s,f)=>s+f.monto,0);
  const expense = finance.filter(f=>f.tipo==='Egreso').reduce((s,f)=>s+f.monto,0);
  return `
  <div class="section-header">
    <div class="section-title">Finanzas</div>
    <button class="action-btn" id="add-finance-btn">+ Nuevo Registro</button>
  </div>
  <div class="fin-summary">
    <div class="fin-box income"><div class="fin-box-label">Total Ingresos</div><div class="fin-box-value">$${income.toLocaleString()}</div></div>
    <div class="fin-box expense"><div class="fin-box-label">Total Egresos</div><div class="fin-box-value">$${expense.toLocaleString()}</div></div>
    <div class="fin-box balance"><div class="fin-box-label">Balance Neto</div><div class="fin-box-value">$${(income-expense).toLocaleString()}</div></div>
  </div>
  <div class="toolbar">
    <input class="search-input" id="search-finance" placeholder="🔍 Buscar donante o categoría..." value="${state.searchFinance}">
    <select class="form-select" id="filter-finance-tipo">
      <option value="Todos">Todos los tipos</option>
      <option ${state.filterFinanceTipo==='Ingreso'?'selected':''}>Ingreso</option>
      <option ${state.filterFinanceTipo==='Egreso'?'selected':''}>Egreso</option>
    </select>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Donante / Concepto</th><th>Categoría</th><th>Fecha</th><th>Método</th><th>Tipo</th><th style="text-align:right">Monto</th><th>Acciones</th></tr></thead>

            <td style="font-size:11px;color:#94a3b8">${f.fecha}</td>
            <td style="font-size:11px">${f.metodo}</td>

                <button class="btn-sm btn-outline" style="color:#ef4444;border-color:#fca5a5" data-del-fin="${f.id}">🗑</button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

    body = `<div class="form-group"><label class="form-label">Nombre del Ministerio *</label><input class="form-input" id="fm-nombre" value="${m.nombre||''}"></div>
    <div class="form-group"><label class="form-label">Líder</label><input class="form-input" id="fm-lider" value="${m.lider||''}"></div>
    <div class="form-group"><label class="form-label">Número de Miembros</label><input class="form-input" id="fm-miembros" type="number" value="${m.miembros||0}"></div>
    <div class="form-group"><label class="form-label">Descripción</label><textarea class="form-input" id="fm-desc" rows="2">${m.descripcion||''}</textarea></div>
    <div class="form-group"><label class="form-label">Próxima Actividad</label><input class="form-input" id="fm-prox" value="${m.proxActividad||''}"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary" id="save-min-btn" style="flex:1">${m.id?'Actualizar':'Crear'}</button>
      <button class="btn-sm btn-outline" id="cancel-modal-btn" style="padding:10px 20px">Cancelar</button>
    </div>`;

  } else if (type === 'attendance-form') {
    const SERVICIOS = ['Dominical Matutino','Dominical Vespertino','Culto de Oración','Servicio Especial','Vigilias','Célula','Actividad Especial'];
    title = 'Registrar Asistencia';
    body = `<div class="two-col">
      <div class="form-group span-2"><label class="form-label">Tipo de Servicio</label><select class="form-input form-select" id="fat-tipo">${SERVICIOS.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" id="fat-fecha" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label class="form-label">Presentes</label><input class="form-input" id="fat-pres" type="number" value="0"></div>
      <div class="form-group span-2"><label class="form-label">Encargado / Mesa</label><input class="form-input" id="fat-enc" value="Mesa Alfa"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn-primary" id="save-att-btn" style="flex:1">Registrar</button>
      <button class="btn-sm btn-outline" id="cancel-modal-btn" style="padding:10px 20px">Cancelar</button>
    </div>`;
  }

  return `<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="close-btn" id="cancel-modal-btn">✕</button>
      </div>
      ${body}
    </div>
  </div>`;
}

// ══════════════ CHARTS ══════════════

function renderCharts() {
  const members = DB.get('members') || [];
  if (state.tab === 'dashboard') { renderMainChart(); renderMinChart(members); }
  else if (state.tab === 'reportes') { renderEstadoChart(members); renderDistChart(members); }
}

function mkChart(id, key, config) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (state.charts[key]) { state.charts[key].destroy(); }
  state.charts[key] = new Chart(ctx, config);
}

function renderMainChart() {
  const dk = state.darkMode, tc = dk?'#94a3b8':'#64748b', gc = dk?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  mkChart('chart-main','main',{type:'line',data:{
    labels:['Dic','Ene','Feb','Mar','Abr','May'],
    datasets:[
      {label:'Membresía',data:[400,420,435,450,465,490],borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,.08)',tension:.4,borderWidth:2,fill:true,pointRadius:3},
      {label:'Asistencia',data:[310,340,320,360,380,410],borderColor:'#10b981',borderDash:[5,5],tension:.4,borderWidth:2,pointRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},color:tc,boxWidth:12}}},
    scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}}}});
}

function renderMinChart(members) {
  const counts = {}; members.forEach(m=>{counts[m.ministerio]=(counts[m.ministerio]||0)+1});
  const tc = state.darkMode?'#94a3b8':'#64748b';
  mkChart('chart-min','min',{type:'doughnut',data:{labels:Object.keys(counts),datasets:[{data:Object.values(counts),backgroundColor:['#4f46e5','#10b981','#f59e0b','#3b82f6','#ec4899','#8b5cf6','#06b6d4','#ef4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},color:tc,boxWidth:10}}}}});
}

function renderEstadoChart(members) {
  const counts = {};
  members.forEach(m=>{
    const k = (m.estado==='Bautizado'||m.estado==='Bautizada')?'Bautizados':(m.estado==='Afiliado'||m.estado==='Afiliada')?'Afiliados':'Otros';
    counts[k]=(counts[k]||0)+1;
  });
  const tc = state.darkMode?'#94a3b8':'#64748b';
  mkChart('chart-estado','estado',{type:'pie',data:{labels:Object.keys(counts),datasets:[{data:Object.values(counts),backgroundColor:['#4f46e5','#10b981','#f59e0b'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},color:tc,boxWidth:10}}}}});
}

function renderDistChart(members) {
  const counts = {}; members.forEach(m=>{counts[m.ministerio]=(counts[m.ministerio]||0)+1});
  const tc = state.darkMode?'#94a3b8':'#64748b', gc = state.darkMode?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  mkChart('chart-dist','dist',{type:'bar',data:{labels:Object.keys(counts),datasets:[{data:Object.values(counts),backgroundColor:'#4f46e5',borderRadius:6,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},x:{grid:{display:false},ticks:{color:tc,font:{size:10}}}}}});
}

// ══════════════ EVENTOS ══════════════

function bindAll() {
  // sidebar
  const sbBtn = document.getElementById('sb-toggle');
  if (sbBtn) sbBtn.onclick = () => { state.sidebarCollapsed = !state.sidebarCollapsed; render(); };

  // dark mode
  const dkBtn = document.getElementById('dark-toggle');
  if (dkBtn) dkBtn.onclick = () => { state.darkMode = !state.darkMode; const c=DB.get('config')||{}; c.darkMode=state.darkMode; DB.set('config',c); render(); };

  // logout
  const logBtn = document.getElementById('logout-btn');
  if (logBtn) logBtn.onclick = () => { state.loggedIn=false; state.currentUser=null; state.loginUser=''; state.loginPass=''; render(); };

  // nav tabs
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.onclick = () => { state.tab=el.dataset.tab; state.modal=null; state.notifDropdown=false; render(); };
  });

  // notif dropdown
  const nBtn = document.getElementById('notif-btn');
  if (nBtn) nBtn.onclick = e => { e.stopPropagation(); state.notifDropdown=!state.notifDropdown; render(); };
  document.onclick = () => { if (state.notifDropdown) { state.notifDropdown=false; render(); } };

  // ── ADD buttons ──
  const btnMap = {
    'add-member-btn':  () => openModal('member-form', null),
    'add-visitor-btn': () => openModal('visitor-form', null),
    'add-ann-btn':     () => openModal('announcement-form', null),
    'add-event-btn':   () => openModal('event-form', null),
    'add-finance-btn': () => openModal('finance-form', null),
    'add-min-btn':     () => openModal('ministry-form', null),
    'add-att-btn':     () => openModal('attendance-form', null),
    'scan-qr-btn':     () => showNotif('✅ QR Escaneado: Josué David Flores — Dominical Matutino', 'success'),
    'backup-btn':      () => { const blob=new Blob([JSON.stringify({members:DB.get('members'),visitors:DB.get('visitors'),finance:DB.get('finance'),events:DB.get('events'),announcements:DB.get('announcements'),ministries:DB.get('ministries'),attendance:DB.get('attendance')},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='icpv_backup_'+new Date().toISOString().split('T')[0]+'.json'; a.click(); showNotif('Backup descargado ✓','success'); },
    'save-cfg-btn':    () => { const c=DB.get('config')||{}; c.churchName=document.getElementById('cfg-name').value; c.pastor=document.getElementById('cfg-pastor').value; c.address=document.getElementById('cfg-address').value; c.phone=document.getElementById('cfg-phone').value; c.email=document.getElementById('cfg-email').value; DB.set('config',c); showNotif('Configuración guardada ✓','success'); },
    'toggle-dark':     () => { state.darkMode=!state.darkMode; const c=DB.get('config')||{}; c.darkMode=state.darkMode; DB.set('config',c); render(); },
    'reset-btn':       () => { if(confirm('¿Restablecer todos los datos? Esta acción no se puede deshacer.')) { DB.del('init'); DB.init(); showNotif('Sistema restablecido','info'); render(); } },
  };
  Object.entries(btnMap).forEach(([id,fn])=>{ const el=document.getElementById(id); if(el) el.onclick=fn; });

  // ── MEMBER ACTIONS ──
  document.querySelectorAll('[data-view]').forEach(el => {
    el.onclick = () => { const m=(DB.get('members')||[]).find(x=>x.id==el.dataset.view); if(m) openModal('member-view',m); };
  });
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = () => { const m=(DB.get('members')||[]).find(x=>x.id==el.dataset.edit); if(m) openModal('member-form',m); };
  });
  document.querySelectorAll('[data-del]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este miembro?')) { DB.set('members',(DB.get('members')||[]).filter(x=>x.id!=el.dataset.del)); showNotif('Miembro eliminado','info'); render(); } };
  });

  // ── VISITOR ACTIONS ──
  document.querySelectorAll('[data-edit-visitor]').forEach(el => {
    el.onclick = () => { const v=(DB.get('visitors')||[]).find(x=>x.id==el.dataset.editVisitor); if(v) openModal('visitor-form',v); };
  });
  document.querySelectorAll('[data-consolidate]').forEach(el => {
    el.onclick = () => { const arr=DB.get('visitors')||[]; const v=arr.find(x=>x.id==el.dataset.consolidate); if(v){v.estado='Consolidado';DB.set('visitors',arr);showNotif('Visitante consolidado ✓','success');render();} };
  });
  document.querySelectorAll('[data-del-visitor]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este visitante?')) { DB.set('visitors',(DB.get('visitors')||[]).filter(x=>x.id!=el.dataset.delVisitor)); showNotif('Visitante eliminado','info'); render(); } };
  });

  // ── ANNOUNCEMENT ACTIONS ──
  document.querySelectorAll('[data-edit-ann]').forEach(el => {
    el.onclick = () => { const a=(DB.get('announcements')||[]).find(x=>x.id==el.dataset.editAnn); if(a) openModal('announcement-form',a); };
  });
  document.querySelectorAll('[data-del-ann]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este anuncio?')) { DB.set('announcements',(DB.get('announcements')||[]).filter(x=>x.id!=el.dataset.delAnn)); showNotif('Anuncio eliminado','info'); render(); } };
  });

  // ── EVENT ACTIONS ──
  document.querySelectorAll('[data-edit-event]').forEach(el => {
    el.onclick = () => { const ev=(DB.get('events')||[]).find(x=>x.id==el.dataset.editEvent); if(ev) openModal('event-form',ev); };
  });
  document.querySelectorAll('[data-del-event]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este evento?')) { DB.set('events',(DB.get('events')||[]).filter(x=>x.id!=el.dataset.delEvent)); showNotif('Evento eliminado','info'); render(); } };
  });

  // ── FINANCE ACTIONS ──
  const sf = document.getElementById('search-finance');
  if (sf) sf.oninput = e => { state.searchFinance=e.target.value; render(); };
  const fft = document.getElementById('filter-finance-tipo');
  if (fft) fft.onchange = e => { state.filterFinanceTipo=e.target.value; render(); };
  document.querySelectorAll('[data-edit-fin]').forEach(el => {
    el.onclick = () => { const f=(DB.get('finance')||[]).find(x=>x.id==el.dataset.editFin); if(f) openModal('finance-form',f); };
  });
  document.querySelectorAll('[data-del-fin]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este registro?')) { DB.set('finance',(DB.get('finance')||[]).filter(x=>x.id!=el.dataset.delFin)); showNotif('Registro eliminado','info'); render(); } };
  });

  // ── MINISTRY ACTIONS ──
  document.querySelectorAll('[data-edit-min]').forEach(el => {
    el.onclick = () => { const m=(DB.get('ministries')||[]).find(x=>x.id==el.dataset.editMin); if(m) openModal('ministry-form',m); };
  });
  document.querySelectorAll('[data-del-min]').forEach(el => {
    el.onclick = () => { if(confirm('¿Eliminar este ministerio?')) { DB.set('ministries',(DB.get('ministries')||[]).filter(x=>x.id!=el.dataset.delMin)); showNotif('Ministerio eliminado','info'); render(); } };
  });

  // ── MEMBER SEARCH / FILTER ──
  const sm = document.getElementById('search-members');
  if (sm) sm.oninput = e => { state.searchMembers=e.target.value; render(); };
  const fmin = document.getElementById('filter-min');
  if (fmin) fmin.onchange = e => { state.filterMinisterio=e.target.value; render(); };
  const fest = document.getElementById('filter-est');
  if (fest) fest.onchange = e => { state.filterEstado=e.target.value; render(); };

  bindModal();
}

function openModal(type, data) { state.modal={type,data}; render(); }
function closeModal() { state.modal=null; render(); }

function bindModal() {
  const ov = document.getElementById('modal-overlay');
  if (ov) ov.onclick = e => { if(e.target===ov) closeModal(); };
  document.querySelectorAll('#cancel-modal-btn').forEach(b => b.onclick = closeModal);

  // Save member
  const smBtn = document.getElementById('save-member-btn');
  if (smBtn) smBtn.onclick = () => {
    const nombre = document.getElementById('f-nombre').value.trim();
    if (!nombre) { showNotif('El nombre es requerido','error'); return; }
    const arr = DB.get('members') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), nombre, correo:document.getElementById('f-correo').value, telefono:document.getElementById('f-tel').value, edad:parseInt(document.getElementById('f-edad').value)||0, genero:document.getElementById('f-genero').value, direccion:document.getElementById('f-dir').value, ministerio:document.getElementById('f-min').value, estado:document.getElementById('f-est').value, fechaIngreso:document.getElementById('f-fecha').value, notas:document.getElementById('f-notas').value };
    if (isEdit) { DB.set('members',arr.map(m=>m.id===isEdit?obj:m)); showNotif('Miembro actualizado ✓','success'); }
    else { arr.push(obj); DB.set('members',arr); showNotif('Miembro agregado ✓','success'); }
    closeModal(); render();
  };

  // Save visitor
  const svBtn = document.getElementById('save-visitor-btn');
  if (svBtn) svBtn.onclick = () => {
    const nombre = document.getElementById('fv-nombre').value.trim();
    if (!nombre) { showNotif('El nombre es requerido','error'); return; }
    const arr = DB.get('visitors') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), nombre, telefono:document.getElementById('fv-tel').value, correo:document.getElementById('fv-correo').value, invitadoPor:document.getElementById('fv-invBy').value, fechaVisita:document.getElementById('fv-fecha').value, estado:document.getElementById('fv-est').value, notas:document.getElementById('fv-notas').value };
    if (isEdit) { DB.set('visitors',arr.map(v=>v.id===isEdit?obj:v)); showNotif('Visitante actualizado ✓','success'); }
    else { arr.push(obj); DB.set('visitors',arr); showNotif('Visitante registrado ✓','success'); }
    closeModal(); render();
  };

  // Save announcement
  const saBtn = document.getElementById('save-ann-btn');
  if (saBtn) saBtn.onclick = () => {
    const titulo = document.getElementById('fa-titulo').value.trim();
    if (!titulo) { showNotif('El título es requerido','error'); return; }
    const arr = DB.get('announcements') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), titulo, contenido:document.getElementById('fa-contenido').value, prioridad:document.getElementById('fa-prio').value, medio:document.getElementById('fa-medio').value, fechaPublicacion:new Date().toISOString().split('T')[0], activo:true };
    if (isEdit) { DB.set('announcements',arr.map(a=>a.id===isEdit?obj:a)); showNotif('Anuncio actualizado ✓','success'); }
    else { arr.push(obj); DB.set('announcements',arr); showNotif('Anuncio publicado ✓','success'); }
    closeModal(); render();
  };

  // Save event
  const seBtn = document.getElementById('save-event-btn');
  if (seBtn) seBtn.onclick = () => {
    const titulo = document.getElementById('fe-titulo').value.trim();
    if (!titulo) { showNotif('El título es requerido','error'); return; }
    const arr = DB.get('events') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), titulo, fecha:document.getElementById('fe-fecha').value, hora:document.getElementById('fe-hora').value, lugar:document.getElementById('fe-lugar').value, ministerio:document.getElementById('fe-min').value, confirmados:parseInt(document.getElementById('fe-conf').value)||0, descripcion:document.getElementById('fe-desc').value };
    if (isEdit) { DB.set('events',arr.map(e=>e.id===isEdit?obj:e)); showNotif('Evento actualizado ✓','success'); }
    else { arr.push(obj); DB.set('events',arr); showNotif('Evento creado ✓','success'); }
    closeModal(); render();
  };

  // Save finance
  const sfBtn = document.getElementById('save-fin-btn');
  if (sfBtn) sfBtn.onclick = () => {
    const donante = document.getElementById('ff-donante').value.trim();
    const monto   = parseFloat(document.getElementById('ff-monto').value);
    if (!donante || !monto) { showNotif('Donante y monto son requeridos','error'); return; }
    const arr = DB.get('finance') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), donante, categoria:document.getElementById('ff-cat').value, tipo:document.getElementById('ff-tipo').value, monto, fecha:document.getElementById('ff-fecha').value, metodo:document.getElementById('ff-met').value, notas:document.getElementById('ff-notas').value };
    if (isEdit) { DB.set('finance',arr.map(f=>f.id===isEdit?obj:f)); showNotif('Registro actualizado ✓','success'); }
    else { arr.push(obj); DB.set('finance',arr); showNotif('Registro guardado ✓','success'); }
    closeModal(); render();
  };

  // Save ministry
  const sminBtn = document.getElementById('save-min-btn');
  if (sminBtn) sminBtn.onclick = () => {
    const nombre = document.getElementById('fm-nombre').value.trim();
    if (!nombre) { showNotif('El nombre es requerido','error'); return; }
    const arr = DB.get('ministries') || [];
    const isEdit = state.modal.data?.id;
    const obj = { id:isEdit||nextId(arr), nombre, lider:document.getElementById('fm-lider').value, miembros:parseInt(document.getElementById('fm-miembros').value)||0, descripcion:document.getElementById('fm-desc').value, proxActividad:document.getElementById('fm-prox').value, activo:true };
    if (isEdit) { DB.set('ministries',arr.map(m=>m.id===isEdit?obj:m)); showNotif('Ministerio actualizado ✓','success'); }
    else { arr.push(obj); DB.set('ministries',arr); showNotif('Ministerio creado ✓','success'); }
    closeModal(); render();
  };

  // Save attendance
  const sattBtn = document.getElementById('save-att-btn');
  if (sattBtn) sattBtn.onclick = () => {
    const arr = DB.get('attendance') || [];
    const obj = { id:nextId(arr), servicio:document.getElementById('fat-tipo').value, fecha:document.getElementById('fat-fecha').value, presentes:parseInt(document.getElementById('fat-pres').value)||0, encargado:document.getElementById('fat-enc').value };
    arr.unshift(obj); DB.set('attendance',arr); showNotif('Asistencia registrada ✓','success');
    closeModal(); render();
  };
}

// ══════════════ ARRANQUE ══════════════
DB.init();
state.darkMode = DB.get('config')?.darkMode || false;
render();
</script>
